personality = "pragmatic"
model = "gpt-5.4-mini"
model_reasoning_effort = "high"
suppress_unstable_features_warning = true
tool_output_token_limit = 12000
# Compact early enough to protect long sessions, but not so early that Codex loses useful working context.
model_auto_compact_token_limit = 220000
web_search = "cached"

[agents]
# Three concurrent subagents is a better cost/perf tradeoff for routine coding sessions.
max_threads = 3
max_depth = 1
job_max_runtime_seconds = 1200

[features]
multi_agent = true
unified_exec = true
apply_patch_freeform = true
shell_snapshot = true
shell_tool = true

[projects."/Users/lionel"]
trust_level = "untrusted"

[mcp_servers.playwright]
enabled = true
args = ["@playwright/mcp@latest"]
command = "bunx"

[mcp_servers.linear]
enabled = false
url = "https://mcp.linear.app/mcp"

[mcp_servers.notion]
enabled = false
url = "https://mcp.notion.com/mcp"

[mcp_servers.figma]
enabled = false
url = "https://mcp.figma.com/mcp"

[mcp_servers.context7]
